<!DOCTYPE html>
<html>
<head>
    <script>
        // Check if the current URL has any uppercase letters
        var currentURL = window.location.href;
        var lowerCaseURL = currentURL.toLowerCase();

        if (currentURL !== lowerCaseURL) {
            // Redirect to the lowercase version
            window.location.replace(lowerCaseURL);
        } else {
            // If it's already lowercase and still a 404, show a message
            document.write("<h1>404 - Page Not Found</h1><p>Sorry, that page doesn't exist.</p>");
        }
    </script>
</head>
<body>
</body>
</html>
